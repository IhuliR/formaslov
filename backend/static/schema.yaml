openapi: 3.0.2
info:
  title: ''
  version: ''
paths:
  /api/v1/documents/:
    get:
      operationId: listTextDocuments
      description: ''
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                required:
                - count
                - results
                properties:
                  count:
                    type: integer
                    example: 123
                  next:
                    type: string
                    nullable: true
                    format: uri
                    example: http://api.example.org/accounts/?offset=400&limit=100
                  previous:
                    type: string
                    nullable: true
                    format: uri
                    example: http://api.example.org/accounts/?offset=200&limit=100
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/TextDocument'
          description: ''
      tags:
      - api
    post:
      operationId: createTextDocument
      description: ''
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TextDocument'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextDocument'
          description: ''
      tags:
      - api
  /api/v1/documents/{id}/:
    get:
      operationId: retrieveTextDocument
      description: ''
      parameters:
      - name: id
        in: path
        required: true
        description: A unique integer value identifying this text document.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextDocument'
          description: ''
      tags:
      - api
    put:
      operationId: updateTextDocument
      description: ''
      parameters:
      - name: id
        in: path
        required: true
        description: A unique integer value identifying this text document.
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TextDocument'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextDocument'
          description: ''
      tags:
      - api
    patch:
      operationId: partialUpdateTextDocument
      description: ''
      parameters:
      - name: id
        in: path
        required: true
        description: A unique integer value identifying this text document.
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TextDocument'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextDocument'
          description: ''
      tags:
      - api
    delete:
      operationId: destroyTextDocument
      description: ''
      parameters:
      - name: id
        in: path
        required: true
        description: A unique integer value identifying this text document.
        schema:
          type: string
      responses:
        '204':
          description: ''
      tags:
      - api
  /api/v1/documents/{id}/chunks/:
    get:
      operationId: chunksTextDocument
      description: ''
      parameters:
      - name: id
        in: path
        required: true
        description: A unique integer value identifying this text document.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextDocument'
          description: ''
      tags:
      - api
  /api/v1/labels/:
    get:
      operationId: listLabels
      description: ''
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Label'
          description: ''
      tags:
      - api
    post:
      operationId: createLabel
      description: ''
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Label'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Label'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Label'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Label'
          description: ''
      tags:
      - api
  /api/v1/labels/{id}/:
    get:
      operationId: retrieveLabel
      description: ''
      parameters:
      - name: id
        in: path
        required: true
        description: A unique integer value identifying this label.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Label'
          description: ''
      tags:
      - api
    put:
      operationId: updateLabel
      description: ''
      parameters:
      - name: id
        in: path
        required: true
        description: A unique integer value identifying this label.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Label'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Label'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Label'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Label'
          description: ''
      tags:
      - api
    patch:
      operationId: partialUpdateLabel
      description: ''
      parameters:
      - name: id
        in: path
        required: true
        description: A unique integer value identifying this label.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Label'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Label'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Label'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Label'
          description: ''
      tags:
      - api
    delete:
      operationId: destroyLabel
      description: ''
      parameters:
      - name: id
        in: path
        required: true
        description: A unique integer value identifying this label.
        schema:
          type: string
      responses:
        '204':
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelInUseError'
          description: The label is referenced by one or more annotations.
      tags:
      - api
  /api/v1/annotations/:
    get:
      operationId: listAnnotations
      description: ''
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Annotation'
          description: ''
      tags:
      - api
    post:
      operationId: createAnnotation
      description: ''
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Annotation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Annotation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Annotation'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'
          description: ''
      tags:
      - api
  /api/v1/annotations/{id}/:
    get:
      operationId: retrieveAnnotation
      description: ''
      parameters:
      - name: id
        in: path
        required: true
        description: A unique integer value identifying this annotation.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'
          description: ''
      tags:
      - api
    put:
      operationId: updateAnnotation
      description: ''
      parameters:
      - name: id
        in: path
        required: true
        description: A unique integer value identifying this annotation.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Annotation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Annotation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Annotation'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'
          description: ''
      tags:
      - api
    patch:
      operationId: partialUpdateAnnotation
      description: ''
      parameters:
      - name: id
        in: path
        required: true
        description: A unique integer value identifying this annotation.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Annotation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Annotation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Annotation'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'
          description: ''
      tags:
      - api
    delete:
      operationId: destroyAnnotation
      description: ''
      parameters:
      - name: id
        in: path
        required: true
        description: A unique integer value identifying this annotation.
        schema:
          type: string
      responses:
        '204':
          description: ''
      tags:
      - api
  /api/v1/documents/upload/:
    post:
      operationId: uploadFileTextDocument
      description: ''
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TextDocumentUpload'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextDocument'
          description: ''
      tags:
      - api
  /api/v1/users/:
    post:
      operationId: createUser
      description: Create a user account through Djoser.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: User created.
        '400':
          description: Invalid username or password.
      tags:
      - auth
  /api/v1/users/me/:
    get:
      operationId: retrieveCurrentUser
      description: Return the authenticated user's id and username.
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: Current user.
        '401':
          description: Authentication credentials were not provided or are invalid.
      tags:
      - auth
  /api/v1/users/set_password/:
    post:
      operationId: setCurrentUserPassword
      description: Change the authenticated user's password through Djoser.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChange'
      responses:
        '204':
          description: Password changed.
        '400':
          description: Invalid current password, mismatched passwords, or password validation failure.
        '401':
          description: Authentication credentials were not provided or are invalid.
      tags:
      - auth
  /api/v1/jwt/create/:
    post:
      operationId: createTokenObtainPair
      description: 'Takes a set of user credentials and returns an access and refresh
        JSON web

        token pair to prove the authentication of those credentials.'
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
      tags:
      - api
  /api/v1/jwt/refresh/:
    post:
      operationId: createTokenRefresh
      description: 'Takes a refresh type JSON web token and returns an access type
        JSON web

        token if the refresh token is valid.'
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
      tags:
      - api
  /api/v1/jwt/verify/:
    post:
      operationId: createTokenVerify
      description: 'Takes a token and indicates if it is valid.  This view provides
        no

        information about a token''s fitness for a particular use.'
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerify'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenVerify'
          description: ''
      tags:
      - api
components:
  schemas:
    TextDocument:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: string
          readOnly: true
        title:
          type: string
          maxLength: 255
          description: Human-readable title. Falls back to original_filename stem or Новый документ.
        slug:
          type: string
          maxLength: 255
          readOnly: true
          description: Transliteration-based slug unique for the authenticated user.
        original_filename:
          type: string
          maxLength: 255
          description: Original uploaded filename, when the document was created from a file.
        content:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - content
    TextDocumentUpload:
      type: object
      properties:
        file:
          type: string
          format: binary
          description: UTF-8 encoded .txt file.
      required:
      - file
    Label:
      type: object
      description: A label owned by the authenticated user. Names are unique per user.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        color:
          type: string
          maxLength: 7
      required:
      - name
    LabelInUseError:
      type: object
      properties:
        detail:
          type: string
          example: 'Нельзя удалить метку «зло»: она используется в 7 аннотациях. Сначала удалите или измените эти аннотации.'
        code:
          type: string
          enum:
          - label_in_use
        annotations_count:
          type: integer
          minimum: 1
          example: 7
      required:
      - detail
      - code
      - annotations_count
    Annotation:
      type: object
      description: An annotation whose document and label must belong to the authenticated user.
      properties:
        id:
          type: integer
          readOnly: true
        document:
          type: integer
          description: ID of a document owned by the authenticated user.
        label:
          type: integer
          description: ID of a label owned by the authenticated user.
        start:
          type: integer
          maximum: 9223372036854775807
          format: int64
          minimum: 0
        end:
          type: integer
          maximum: 9223372036854775807
          format: int64
          minimum: 0
        text:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - document
      - label
      - start
      - end
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - username
      - password
    TokenRefresh:
      type: object
      properties:
        refresh:
          type: string
        access:
          type: string
          readOnly: true
      required:
      - refresh
    TokenVerify:
      type: object
      properties:
        token:
          type: string
          writeOnly: true
      required:
      - token
    UserCreate:
      type: object
      properties:
        username:
          type: string
          maxLength: 150
        password:
          type: string
          writeOnly: true
      required:
      - username
      - password
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          maxLength: 150
      required:
      - username
    PasswordChange:
      type: object
      properties:
        current_password:
          type: string
          writeOnly: true
        new_password:
          type: string
          writeOnly: true
        re_new_password:
          type: string
          writeOnly: true
      required:
      - current_password
      - new_password
      - re_new_password
